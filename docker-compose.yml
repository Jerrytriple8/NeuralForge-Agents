version: "3.9"

services:
  neuralforge:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./examples:/app/examples:ro
    environment:
      - NEURALFORGE_LOG_LEVEL=INFO
    restart: unless-stopped

  # Optional: Redis for distributed caching
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
